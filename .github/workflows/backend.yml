name: backend

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    env:
      SIM_ATLAS_JWT_SECRET: test-secret-key-for-ci-testing-only
      SIM_ATLAS_JWT_ALGORITHM: HS256
      SIM_ATLAS_LLM_API_KEY: test-llm-api-key
      SIM_ATLAS_LLM_BASE_URL: http://llm.local/v1
      SIM_ATLAS_LLM_CHAT_MODEL: test-model
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        
      - name: Install dependencies
        run: uv sync --dev
        working-directory: ./backend
        
      - name: Run ruff check
        run: uv run ruff check .
        working-directory: ./backend
        
      - name: Run ruff format (check)
        run: uv run ruff format --check .
        working-directory: ./backend
        
      - name: Run pyright
        run: uv run pyright
        working-directory: ./backend

      - name: Run pytest
        run: uv run pytest
        working-directory: ./backend
