name: e2e

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend
        run: uv sync
        working-directory: ./backend

      - name: Start backend server
        run: |
          uv run sim-atlas --host 127.0.0.1 --port 8000 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        working-directory: ./backend

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/v1/filter_options > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30 seconds"
          exit 1

      - name: Generate access token
        run: |
          TOKEN=$(uv run sim-atlas-access-token "CI Bot" "ci@example.com")
          echo "SIM_ATLAS_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"
        working-directory: ./backend

      - name: Init upload venv
        run: uv venv --python=3.12
        working-directory: ./e2e

      - name: Install dummy-module and upload script into venv
        run: uv pip install dummy_module/. ../toolkit/.
        working-directory: ./e2e

      - name: Upload dummy module
        run: |
          uv run sim-atlas-upload dummy_module dummy_module.flowrep \
            --api-url http://127.0.0.1:8000/api/v1 \
            --api-token "$SIM_ATLAS_API_TOKEN" \
            --module-allow flowrep \
            --log-level debug
        working-directory: ./e2e

      - name: Verify flowrep artifacts
        run: |
          curl -sf -X POST "http://127.0.0.1:8000/api/v1/search" \
            -H "Content-Type: application/json" \
            -d '{"filter": {"keywords": ["flowrep"]}, "limit": 10}' | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          total = d['results']['total_items']
          assert total == 3, f'Expected exactly 3 flowrep artifacts, got {total}: {d}'
          print(f'OK — {total} flowrep artifact(s) found')
          types = [item['node']['artifact_type'] for item in d['results']['data']]
          functions = [t for t in types if t == 'function']
          workflows = [t for t in types if t == 'workflow']
          assert len(functions) == 2, f'Expected 2 function artifacts among flowrep, got {len(functions)}'
          assert len(workflows) == 1, f'Expected 1 workflow artifact among flowrep, got {len(workflows)}'
          print(f'OK — artifact types correct: {len(functions)} function(s), {len(workflows)} workflow(s)')
          "

      - name: Verify artifacts were uploaded
        run: |
          curl -sf -X POST "http://127.0.0.1:8000/api/v1/search" \
            -H "Content-Type: application/json" \
            -d '{"limit": 10}' | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          total = d['results']['total_items']
          assert total == 5, f'Expected exactly 5 artifacts, got {total}: {d}'
          print(f'OK — {total} artifact(s) found')

          nodes = {item['node']['name']: item['node'] for item in d['results']['data']}

          expected = {
              'dummy_module.functions.add': {
                  'docstring_prefix': 'Add two integers and return their sum.',
                  'brief_description': 'Add two integers and return their sum.',
                  'description': 'Add two integers and return their sum.\n\nPerforms simple integer addition without overflow checks.',
                  'inputs': [
                      ('x', 'int', 'The first integer operand.'),
                      ('y', 'int', 'The second integer operand.'),
                  ],
                  'output_datatype': 'int',
                  'output_description': 'The sum of x and y.',
              },
              'dummy_module.functions.mul': {
                  'docstring_prefix': 'Multiply two floats and return their product.',
                  'brief_description': 'Multiply two floats and return their product.',
                  'description': 'Multiply two floats and return their product.\n\nPerforms standard floating-point multiplication.',
                  'inputs': [
                      ('x', 'float', 'The first floating-point factor.'),
                      ('y', 'float', 'The second floating-point factor.'),
                  ],
                  'output_datatype': 'float',
                  'output_description': 'The product of x and y.',
              },
          }

          for name, checks in expected.items():
              assert name in nodes, f'Missing artifact: {name}'
              node = nodes[name]
              assert node['artifact_type'] == 'function', f'{name}: unexpected artifact_type'
              assert node['docstring'].startswith(checks['docstring_prefix']), f'{name}: docstring mismatch: {node[\"docstring\"]!r}'
              assert node['brief_description'] == checks['brief_description'], f'{name}: brief_description mismatch: {node[\"brief_description\"]!r}'
              assert node['description'] == checks['description'], f'{name}: description mismatch: {node[\"description\"]!r}'
              for i, (label, datatype, description) in enumerate(checks['inputs']):
                  inp = node['inputs'][i]
                  assert inp['label'] == label, f'{name} input[{i}]: expected label {label!r}, got {inp[\"label\"]!r}'
                  assert inp['datatype'] == datatype, f'{name} input[{i}]: expected datatype {datatype!r}, got {inp[\"datatype\"]!r}'
                  assert inp['description'] == description, f'{name} input[{i}]: expected description {description!r}, got {inp[\"description\"]!r}'
              out = node['outputs'][0]
              assert out['datatype'] == checks['output_datatype'], f'{name} output datatype mismatch'
              assert out['description'] == checks['output_description'], f'{name} output description mismatch'
              print(f'OK — {name} metadata verified')

          workflow_nodes = [item['node'] for item in d['results']['data'] if item['node']['artifact_type'] == 'workflow']
          assert len(workflow_nodes) == 1, f'Expected exactly 1 workflow artifact, got {len(workflow_nodes)}'
          wf = workflow_nodes[0]
          assert 'wf_definition' in wf, f'workflow artifact missing wf_definition field'
          assert isinstance(wf['wf_definition']['nodes'], list), f'wf_definition.nodes is not a list'
          assert isinstance(wf['wf_definition']['edges'], list), f'wf_definition.edges is not a list'
          print(f'OK — workflow artifact {wf[\"name\"]!r} verified')
          "

      - name: Verify execution results
        run: |
          WF_ID=$(curl -sf -X POST "http://127.0.0.1:8000/api/v1/search" \
            -H "Content-Type: application/json" \
            -d '{"query": "linear", "filter": {"artifact_type": ["workflow"]}, "limit": 5}' | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          matches = [i['node']['id'] for i in d['results']['data'] if i['node']['name'] == 'dummy_module.flowrep.linear']
          assert len(matches) == 1, f'Expected exactly one linear workflow, got {matches}'
          print(matches[0])
          ")

          curl -sf "http://127.0.0.1:8000/api/v1/artifacts/$WF_ID/execution_results" | \
            python3 -c "
          import sys, json
          results = json.load(sys.stdin)
          assert len(results) == 3, f'Expected 3 execution results, got {len(results)}: {results}'

          expected = [
              {'x': -1.3, 'slope': -5, 'intercept': 2.1},
              {'x': 3.1, 'slope': 2, 'intercept': 0},
              {'x': 81.0, 'slope': 9, 'intercept': -1.1},
          ]

          def inputs_by_label(result):
              return {io['label']: io['value'] for io in result['inputs']}

          for exp in expected:
              match = [r for r in results if inputs_by_label(r).get('x') == exp['x']]
              assert len(match) == 1, f'Expected exactly one run with x={exp[\"x\"]}, got {len(match)}'
              ins = inputs_by_label(match[0])
              outputs = json.loads(match[0]['outputs'])
              expected_result = exp['slope'] * exp['x'] + exp['intercept']
              assert abs(outputs['result'] - expected_result) < 1e-6, f'x={exp[\"x\"]}: expected result {expected_result}, got {outputs}'
              print(f'OK — run x={ins[\"x\"]}, slope={ins[\"slope\"]}, intercept={ins[\"intercept\"]} -> {outputs}')
          "

      - name: Install Playwright dependencies
        run: npm ci
        working-directory: ./e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./e2e

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ./e2e

      - name: Stop backend server
        if: always()
        run: kill "$SERVER_PID"
