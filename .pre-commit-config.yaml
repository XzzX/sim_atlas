repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.19
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
- repo: local
  hooks:
    - id: backend-pyright
      name: backend pyright
      entry: bash -c 'cd backend && uv run pyright'
      language: system
      files: ^backend/
      pass_filenames: false
      stages: [pre-push]
    - id: backend-pytest
      name: backend pytest
      entry: bash -c 'cd backend && uv run pytest'
      language: system
      files: ^backend/
      pass_filenames: false
      stages: [pre-push]
    - id: toolkit-pyright
      name: toolkit pyright
      entry: bash -c 'cd toolkit && uv run pyright'
      language: system
      files: ^toolkit/
      pass_filenames: false
      stages: [pre-push]
    - id: toolkit-pytest
      name: toolkit pytest
      entry: bash -c 'cd toolkit && uv run pytest'
      language: system
      files: ^toolkit/
      pass_filenames: false
      stages: [pre-push]
