workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

variables:
  JWT_SECRET_KEY: "ci-dummy-secret"
  JWT_ALGORITHM: "HS256"
  LLM_API_KEY: "ci-dummy-api-key"
  LLM_API_URL: "http://localhost:11434/v1"
  LLM_EMBEDDING_MODEL: "ci-dummy-embedding-model"
  LLM_CHAT_MODEL: "ci-dummy-chat-model"
  VOYAGE_API_KEY: "ci-dummy-voyage-api-key"

default:
  interruptible: true

backend_lint_and_type_check:
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install uv
  script:
    - cd backend
    - uv sync --dev
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run pyright

backend_test_and_coverage:
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install uv
  script:
    - cd backend
    - uv sync --dev
    - uv run coverage run -m pytest
    - uv run coverage report
    - uv run coverage html
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    paths:
      - backend/htmlcov/
    expose_as: Coverage Report
